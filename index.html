<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banana Ice</title>
    <link rel="icon" type="image/svg+xml" href="assets/banana-favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Banana Ice</h1>
      <p class="subtitle">Today: bananas vs diamonds</p>

      <section class="panel">
        <div class="row">
          <h2>Banana Price</h2>
          <p id="banana-price" class="price">Loading...</p>
          <p id="banana-meta" class="meta"></p>
        </div>

        <div class="row">
          <h2>Diamond Price</h2>
          <p id="diamond-price" class="price">Loading...</p>
          <p id="diamond-meta" class="meta"></p>
        </div>

        <div class="compare">
          <h2>Comparison</h2>
          <p id="compare-text">Loading...</p>
        </div>

        <button id="refresh" type="button">Refresh Prices</button>
      </section>

      <p class="footnote">
        Banana source: FRED series PBANSOPUSDM. Diamond source: OpenFacet DCX index.
      </p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
